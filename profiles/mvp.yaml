name: mvp
host: 127.0.0.1
port: 8765

upstreams:
  context7:
    description: Resolve library identifiers and query current library documentation.
    transport: stdio
    command: npx
    args: ["-y", "@upstash/context7-mcp"]
    env: {}
    shareable: true
    qualifier: context7-readonly-v3
    concurrency: serial
    call_timeout_seconds: 30
    idle_timeout_seconds: 300

  code-review-graph:
    description: Explore code structure, impact, execution flows, and test relationships.
    transport: stdio
    command: code-review-graph
    args: ["serve"]
    env: {}
    shareable: false
    concurrency: parallel
    call_timeout_seconds: 30
    idle_timeout_seconds: 300
