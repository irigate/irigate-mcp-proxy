name: smoke-test
description: >-
  Pre-implementation echo-upstream fixture for the Streamable HTTP
  transport and multi-client spikes in IMPLEMENTATION-PLAN.md. It requires
  no external backend, network access, or credentials.

upstreams:
  - key: echo
    transport: stdio
    command: python3
    args: ["-m", "irigate.mcp_smoke_echo"]
    env:
      TEST_KEY: "Non-secret fixture value supplied by the broker process environment."
    inherit_os_env:
      - PATH
      - HOME
      - LANG
      - LC_ALL
      - TZ
    call_timeout_seconds: 10