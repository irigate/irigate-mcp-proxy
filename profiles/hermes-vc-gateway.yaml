name: hermes-vc-gateway
description: >-
  Pre-implementation inventory of heavy MCP servers used by the operator.
  This file is input to the sharing and benchmark spikes in
  IMPLEMENTATION-PLAN.md; it is not production-ready configuration and
  does not imply that every listed upstream is safe to share.

upstreams:
  - key: code-review-graph
    transport: stdio
    command: uvx
    args: ["code-review-graph", "serve"]
    env: {}
    inherit_os_env:
      - PATH
      - HOME
      - USER
      - LANG
      - LC_ALL
      - TZ
      - UV_CACHE_DIR          # operator sets this to /tmp/uv on shared hosts
    call_timeout_seconds: 30

  - key: DocumentDB
    transport: stdio
    command: uvx
    args: ["awslabs.documentdb-mcp-server@latest"]
    env: {}
    inherit_os_env:
      - PATH
      - HOME
      - USER
      - LANG
      - LC_ALL
      - TZ
      - NODE_EXTRA_CA_CERTS
      - UV_CACHE_DIR
    call_timeout_seconds: 15

  - key: context7
    transport: stdio
    command: npx
    args: ["-y", "@upstash/context7-mcp"]
    env: {}
    inherit_os_env:
      - PATH
      - HOME
      - USER
      - LANG
      - LC_ALL
      - TZ
      - NPM_CONFIG_CACHE
    call_timeout_seconds: 30

  - key: pencil
    transport: stdio
    command: "C:/Program Files/Pencil/pencil-mcp.exe"
    args: []
    env: {}
    # NOTE: pencil is a Windows .exe. When the gateway host is WSL, it
    # must launch pencil via Windows interop (the .exe suffix makes WSL
    # forward to the Windows binary automatically). The env vars below
    # are Windows-side; the gateway filters inherit_os_env against its
    # own (Linux) process env, so these will be ABSENT unless the
    # operator exports them in the gateway's startup script (e.g.
    # `USERPROFILE="C:\\Users\\operator"` before starting the gateway)
    # OR the gateway is run from native Windows Python. If pencil
    # misbehaves under WSL, run the gateway natively on Windows or
    # drop pencil from this profile.
    inherit_os_env:
      - PATH              # pencil.exe may shell out to other Windows binaries
      - USERPROFILE
      - LOCALAPPDATA
      - TEMP
      - SYSTEMROOT
    call_timeout_seconds: 60

  - key: shadcn
    transport: stdio
    command: npx
    args: ["-y", "@shadcn-ui/mcp"]
    env: {}
    inherit_os_env:
      - PATH
      - HOME
      - USER
      - LANG
      - LC_ALL
      - TZ
      - NPM_CONFIG_CACHE
    call_timeout_seconds: 30
